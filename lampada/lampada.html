<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lâmpada Interativa</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>Lâmpada Interativa</h1>
  <p id="status">A lâmpada está desligada.</p>

  <div class="stage">
    <svg id="lamp" width="120" height="220" viewBox="0 0 120 220">
      <defs>
        <radialGradient id="glow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#ffe066" stop-opacity="0.9"/>
          <stop offset="100%" stop-color="#f5c842" stop-opacity="0"/>
        </radialGradient>
      </defs>

      <ellipse id="glowEl" cx="60" cy="80" rx="72" ry="72" fill="url(#glow)" opacity="0"/>

      <rect x="52" y="160" width="16" height="40" rx="3" fill="#888"/>
      <rect x="38" y="196" width="44" height="9" rx="4" fill="#666"/>
      <rect x="48" y="138" width="24" height="26" rx="4" fill="#aaa"/>

      <path id="bulb"
        d="M60 28 C28 28 13 55 13 82 C13 108 28 128 45 138 L75 138 C92 128 107 108 107 82 C107 55 92 28 60 28 Z"
        fill="#3a3a3a" stroke="#555" stroke-width="1.5"/>

      <polyline id="filamento"
        points="50,128 50,108 55,100 65,100 70,108 70,128"
        fill="none" stroke="#666" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <div class="btns">
    <button onclick="aparecer()">Aparecer</button>
    <button onclick="sumir()">Sumir</button>
    <button onclick="apagar()">Apagar</button>
    <button onclick="acender()">Acender</button>
    <button onclick="piscar()">Piscar</button>
    <button onclick="pararPiscar()">Parar piscar</button>
    <button id="btn-efeito" onclick="efeito()">✦ Efeito especial</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
