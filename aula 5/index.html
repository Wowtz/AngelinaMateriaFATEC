<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="script" href="script.js">
    <title>Document</title>
</head>

<body>
    <div style="display: flex; flex-direction: column; width: 300px;">
        <label for="num"> Numero: </label>
        <input type="text" name="num" id="num">
        <input type="button" value="Verificar" onclick="verificar()">


        <label for="num"> Media: </label>
        <input type="text" name="media" id="media">
        <label for="num"> Frequência: </label>
        <input type="text" name="freq" id="freq">
        <input type="button" value="calc" onclick="calcAprovacao()">
        <label id="result"></label>
    </div>

    <script>
        function verificar() {
            let num = document.getElementById('num').value

            if (num == 0)
                alert("nulo")
            else if (num > 0)
                alert("positivo")
            else
                alert("negativo")
        }

        function calcAprovacao() {
            let media = document.getElementById('media').value
            let freq = document.getElementById('freq').value

            if (media > 6 ) {
                if (freq >= 75) {
                    document.getElementById('result').innerHTML = 'aprovado'
                } else {
                    document.getElementById('result').innerHTML = 'rf'
                }
            } else if (freq >= 75) {
                document.getElementById('result').innerHTML = 'rn'
            } else {
                document.getElementById('result').innerHTML = 'rnf'
            }
        }
    </script>
</body>

</html>
